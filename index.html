<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- スマホで全画面あそび: iOSは「ホーム画面に追加」でブラウザのバーが消える -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="あやがわの夏" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#14181f" />
  <title>あやがわの夏</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="grade"></div>
  <div id="filter"></div>
  <div id="ui">
    <div id="hud"></div>
    <div id="daynote"></div>
    <div id="guide"></div>
    <div id="prompt"></div>
    <div id="toasts"></div>
    <div id="dialogue">
      <div id="dlg-name"></div>
      <div id="dlg-text"></div>
      <div class="dlg-cursor">▼</div>
    </div>
    <div id="choice"></div>
    <div id="zukan"></div>
    <div id="map"></div>
    <div id="settings"></div>
    <div id="pause"></div>
    <div id="diary"></div>
    <div id="ending"></div>
    <div id="title"></div>
    <div id="tutorial"></div>
    <div id="helpbar">WASD あるく ・ Shift はしる ・ E しらべる ・ Z ずかん ・ X ちず ・ P ポーズ ・ M おと</div>
    <div id="fade"></div>
  </div>
  <div id="ctrl-toggle"></div>
  <div id="opt-toggle">せってい</div>
  <div id="pause-toggle">⏸ ポーズ</div>
  <div id="touch">
    <div id="joy"><div id="joy-knob"></div></div>
    <div id="touch-btns">
      <div class="tbtn" id="btnX">ちず</div>
      <div class="tbtn" id="btnZ">ずかん</div>
      <div class="tbtn big" id="btnA">しらべる</div>
    </div>
  </div>
  <div id="rotate">
    <div class="rotate-inner">
      <div class="rotate-icon">📱</div>
      <div>スマホを <b>よこむき</b> にして あそんでね</div>
    </div>
  </div>
  <div id="a2hs">
    <div class="a2hs-inner">
      <span class="a2hs-close">✕</span>
      <b>ホーム画面に ついか</b> すると、URLバーの ない<br>
      ぜんがめんで あそべるよ。<br>
      <small>Safari した の「共有」ボタン → 「ホーム画面に追加」</small>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
