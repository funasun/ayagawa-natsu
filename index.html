<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>あやがわの夏</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="filter"></div>
  <div id="ui">
    <div id="hud"></div>
    <div id="daynote"></div>
    <div id="prompt"></div>
    <div id="toasts"></div>
    <div id="dialogue">
      <div id="dlg-name"></div>
      <div id="dlg-text"></div>
      <div class="dlg-cursor">▼</div>
    </div>
    <div id="choice"></div>
    <div id="zukan"></div>
    <div id="settings"></div>
    <div id="diary"></div>
    <div id="ending"></div>
    <div id="title"></div>
    <div id="helpbar">WASD あるく ・ Shift はしる ・ E しらべる ・ Z ずかん ・ M おと</div>
    <div id="fade"></div>
  </div>
  <div id="ctrl-toggle"></div>
  <div id="opt-toggle">せってい</div>
  <div id="touch">
    <div id="joy"><div id="joy-knob"></div></div>
    <div id="touch-btns">
      <div class="tbtn" id="btnZ">ずかん</div>
      <div class="tbtn big" id="btnA">しらべる</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
